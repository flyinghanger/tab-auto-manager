<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tab Auto Manager Preview</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      display: flex;
      justify-content: center;
      padding: 40px;
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .preview-wrapper { text-align: center; }
    .preview-frame {
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      overflow: hidden;
      background: #fff;
      width: 380px;
    }
    .preview-label {
      color: #999;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
  <!-- Mock chrome APIs before anything else -->
  <script src="mock.js"></script>
</head>
<body>
  <div class="preview-wrapper">
    <div class="preview-frame" id="frame"></div>
    <div class="preview-label">Extension Popup Preview (mock data, 3d expire)</div>
  </div>
  <script>
    // Fetch popup.html, extract styles + body, inject mock chrome, then load popup.js
    fetch('popup.html')
      .then((r) => r.text())
      .then((html) => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Copy styles
        doc.querySelectorAll('style').forEach((s) => {
          document.head.appendChild(s.cloneNode(true));
        });

        // Copy body content (without the original script tag)
        const frame = document.getElementById('frame');
        Array.from(doc.body.children).forEach((el) => {
          if (el.tagName === 'SCRIPT') return;
          frame.appendChild(document.importNode(el, true));
        });

        // Now load popup.js (chrome is already mocked)
        const script = document.createElement('script');
        script.src = 'popup.js';
        document.body.appendChild(script);
      });
  </script>
</body>
</html>
