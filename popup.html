<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    /* ── Header ── */
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 600; }

    .toggle-switch { position: relative; width: 40px; height: 22px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #ccc; border-radius: 22px; transition: 0.2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: #4f46e5; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* ── Settings ── */
    .settings { padding: 12px 16px; border-bottom: 1px solid #eee; }
    .setting-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-label { color: #555; font-size: 12px; }

    .day-selector { display: flex; gap: 4px; }
    .day-btn {
      padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px;
      background: #fff; cursor: pointer; font-size: 12px; color: #555;
      transition: all 0.15s;
    }
    .day-btn:hover { border-color: #4f46e5; color: #4f46e5; }
    .day-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }

    .custom-time { display: flex; align-items: center; gap: 4px; margin-top: 6px; }
    .custom-time input {
      width: 60px; padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12px; outline: none; text-align: center;
    }
    .custom-time input:focus { border-color: #4f46e5; }
    .custom-time select {
      padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12px; outline: none; background: #fff; cursor: pointer;
    }
    .custom-time select:focus { border-color: #4f46e5; }
    .custom-time .btn-apply {
      padding: 4px 8px; border: 1px solid #4f46e5; border-radius: 6px;
      background: #4f46e5; color: #fff; cursor: pointer; font-size: 11px;
      white-space: nowrap;
    }
    .custom-time .btn-apply:hover { background: #4338ca; }

    .checkbox-row { display: flex; align-items: center; gap: 6px; }
    .checkbox-row input[type="checkbox"] { accent-color: #4f46e5; }

    /* ── Stats ── */
    .stats {
      display: flex; gap: 16px; padding: 10px 16px;
      background: #f9fafb; border-bottom: 1px solid #eee;
    }
    .stat { text-align: center; flex: 1; }
    .stat-value { font-size: 20px; font-weight: 600; color: #4f46e5; }
    .stat-label { font-size: 11px; color: #999; margin-top: 2px; }

    /* ── Tab nav ── */
    .tabs-nav { display: flex; border-bottom: 1px solid #eee; }
    .tabs-nav button {
      flex: 1; padding: 9px; border: none; background: none;
      cursor: pointer; font-size: 12px; color: #999;
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .tabs-nav button.active { color: #4f46e5; border-bottom-color: #4f46e5; }

    /* ── Tab list ── */
    .section { padding: 8px 16px; }
    .tab-list { max-height: 300px; overflow-y: auto; }

    .tab-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid #f5f5f5;
      cursor: default;
    }
    .tab-item:last-child { border-bottom: none; }
    .tab-item-clickable { cursor: pointer; }
    .tab-item-clickable:hover { background: #f9fafb; margin: 0 -8px; padding: 7px 8px; border-radius: 6px; }

    .tab-favicon {
      width: 16px; height: 16px; border-radius: 2px; flex-shrink: 0;
      background: #eee;
    }
    .tab-info { flex: 1; min-width: 0; }
    .tab-title {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px;
    }
    .tab-meta { font-size: 11px; color: #999; margin-top: 1px; }
    .tab-expire-soon .tab-meta { color: #e53e3e; }

    .tab-actions { flex-shrink: 0; display: flex; gap: 4px; }
    .btn-sm {
      padding: 2px 8px; border: 1px solid #ddd; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 11px; color: #555;
      transition: all 0.1s;
    }
    .btn-sm:hover { border-color: #4f46e5; color: #4f46e5; }
    .btn-danger:hover { border-color: #e53e3e; color: #e53e3e; }

    .empty-state { text-align: center; color: #999; padding: 24px 0; font-size: 12px; }

    /* ── Whitelist ── */
    .whitelist-input {
      display: flex; gap: 4px; margin-bottom: 8px;
    }
    .whitelist-input input {
      flex: 1; padding: 5px 8px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12px; outline: none;
    }
    .whitelist-input input:focus { border-color: #4f46e5; }
    .whitelist-input button {
      padding: 5px 10px; border: 1px solid #4f46e5; border-radius: 6px;
      background: #4f46e5; color: #fff; cursor: pointer; font-size: 12px;
    }

    .whitelist-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .wl-tag {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 8px; background: #f0f0ff; border-radius: 12px;
      font-size: 11px; color: #4f46e5;
    }
    .wl-tag-remove {
      cursor: pointer; font-size: 14px; line-height: 1;
      color: #999; border: none; background: none; padding: 0;
    }
    .wl-tag-remove:hover { color: #e53e3e; }

    .btn-add-current {
      width: 100%; padding: 6px; border: 1px dashed #4f46e5; border-radius: 6px;
      background: #f0f0ff; color: #4f46e5; cursor: pointer; font-size: 12px;
      transition: all 0.15s;
    }
    .btn-add-current:hover { background: #e0e0ff; }

    /* ── Progress bar ── */
    .progress-bar {
      width: 100%; height: 3px; background: #eee; border-radius: 2px;
      margin-top: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 2px; transition: width 0.3s;
    }
    .progress-safe { background: #10b981; }
    .progress-warn { background: #f59e0b; }
    .progress-danger { background: #e53e3e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tab Auto Manager</h1>
    <label class="toggle-switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="settings">
    <div class="setting-row">
      <span class="setting-label">Auto-close after</span>
      <div class="day-selector">
        <button class="day-btn" data-seconds="86400">1d</button>
        <button class="day-btn" data-seconds="259200">3d</button>
        <button class="day-btn" data-seconds="604800">7d</button>
        <button class="day-btn" data-seconds="1209600">14d</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Custom</span>
      <div class="custom-time">
        <input type="number" id="customValue" min="1" placeholder="10">
        <select id="customUnit">
          <option value="1">s</option>
          <option value="60">m</option>
          <option value="3600">h</option>
          <option value="86400">d</option>
        </select>
        <button class="btn-apply" id="customApply">Apply</button>
      </div>
    </div>
    <div class="setting-row">
      <label class="checkbox-row">
        <input type="checkbox" id="notifyToggle">
        <span class="setting-label">Notify before closing</span>
      </label>
    </div>
    <div class="setting-row">
      <label class="checkbox-row">
        <input type="checkbox" id="skipGroupToggle">
        <span class="setting-label">Skip tabs in groups</span>
      </label>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalTabs">0</div>
      <div class="stat-label">Open</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="expiringSoon">0</div>
      <div class="stat-label">Expiring</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalClosed">0</div>
      <div class="stat-label">Closed</div>
    </div>
  </div>

  <div class="tabs-nav">
    <button class="active" data-tab="allTabs">Open</button>
    <button data-tab="history">Closed</button>
    <button data-tab="whitelist">Whitelist</button>
  </div>

  <div class="section" id="allTabsSection">
    <div class="tab-list" id="allTabsList"></div>
  </div>

  <div class="section" id="historySection" style="display: none;">
    <div class="tab-list" id="historyList"></div>
  </div>

  <div class="section" id="whitelistSection" style="display: none;">
    <div class="whitelist-input">
      <button id="wlAddCurrent" class="btn-add-current">+ Current site</button>
    </div>
    <div class="whitelist-input">
      <input type="text" id="wlInput" placeholder="e.g. github.com or *.google.com">
      <button id="wlAdd">Add</button>
    </div>
    <div class="whitelist-tags" id="wlTags"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
